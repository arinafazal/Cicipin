<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Restoran - Cicipin</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.jpg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <header>
        <div class="header-inner">
            <a href="{{ url_for('index') }}" class="logo">
                <div class="logo-mark">
                    <img src="{{ url_for('static', filename='favicon.jpg') }}" alt="Cicipin" />
                </div>
                <div class="logo-text">Cicipin</div>
            </a>
        </div>
    </header>

    <main>
        <div class="form-container">
            <div class="form-section">
                <h2>Edit Restoran</h2>

                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for category, message in messages %}
                <div class="popup {{ category }} show" id="popupMessage">
                    <p id="popupText">{{ message }}</p>
                </div>
                {% endfor %}
                {% endif %}
                {% endwith %}

                <form method="POST" enctype="multipart/form-data">
                    <div class="form-group">
                        <label>Nama Restoran:</label>
                        <input type="text" name="name" value="{{ restaurant['name'] }}" required>
                    </div>

                    <div class="form-group">
                        <label>Kategori:</label>
                        <select name="category" required>
                            <option value="">Pilih kategori</option>
                            <option value="Indonesia" {% if restaurant.get('category') == 'Indonesia' %}selected{% endif %}>Indonesia</option>
                            <option value="Jepang" {% if restaurant.get('category') == 'Jepang' %}selected{% endif %}>Jepang</option>
                            <option value="Italia" {% if restaurant.get('category') == 'Italia' %}selected{% endif %}>Italia</option>
                            <option value="Chinese" {% if restaurant.get('category') == 'Chinese' %}selected{% endif %}>Chinese</option>
                            <option value="Seafood" {% if restaurant.get('category') == 'Seafood' %}selected{% endif %}>Seafood</option>
                            <option value="Kafe" {% if restaurant.get('category') == 'Kafe' %}selected{% endif %}>Kafe</option>
                            <option value="Street Food" {% if restaurant.get('category') == 'Street Food' %}selected{% endif %}>Street Food</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Alamat:</label>
                        <input type="text" name="address" value="{{ restaurant['address'] }}" required>
                    </div>

                    <div class="form-group">
                        <label>Jam Buka (opsional):</label>
                        <input type="text" name="opening_hours" value="{{ restaurant.get('opening_hours','') }}" placeholder="08:00-22:00">
                        <small>Format: HH:MM-HH:MM</small>
                    </div>

                    <div class="form-group">
                        <label>Latitude:</label>
                        <input type="number" name="latitude" step="any" value="{{ restaurant.get('latitude', '') }}" placeholder="-6.2088" required>
                    </div>

                    <div class="form-group">
                        <label>Longitude:</label>
                        <input type="number" name="longitude" step="any" value="{{ restaurant.get('longitude', '') }}" placeholder="106.8456" required>
                    </div>

                    <div class="form-group">
                        <label>Price Range (contoh: Rp 10.000 - 50.000):</label>
                        <input type="text" name="price_range" value="{{ restaurant.get('price_range', '') }}" required>
                    </div>

                    <div class="form-group">
                        <label>Upload Foto Restoran (opsional):</label>
                        <input type="file" name="image" accept="image/*">
                    </div>

                    <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
                </form>

                <div class="auth-link" style="margin-top:20px;">
                    <a href="{{ url_for('index') }}">Kembali ke daftar restoran</a>
                </div>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
