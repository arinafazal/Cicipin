<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Cicipin</title>
    <link rel="icon" type="image/jpg" href="{{ url_for('static', filename='favicon.jpg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <header>
        <div class="header-inner">
            <a href="{{ url_for('index') }}" class="logo">
                <div class="logo-mark">
                    <img src="{{ url_for('static', filename='favicon.jpg') }}" alt="Cicipin" />
                </div>
                <div class="logo-text">Cicipin</div>
            </a>

            <nav class="nav-links">
                <a href="{{ url_for('login') }}" class="nav-link active">Masuk</a>
                <a href="{{ url_for('register') }}" class="nav-link">Daftar</a>
            </nav>
        </div>
    </header>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="popup {{ category }} show" id="popupMessage">
        <p id="popupText">{{ message }}</p>
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <div class="auth-container">
        <div class="auth-card">
            <h1>Masuk</h1>
            <p class="auth-tagline">Masuk untuk mulai review restoran favoritmu.</p>

            <form action="{{ url_for('login') }}" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="kucing123" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div>
                    <button type="submit" class="auth-submit-btn">Masuk</button>
                </div>
            </form>

            <p class="auth-link">Belum punya akun? <a href="{{ url_for('register') }}">Daftar di sini</a></p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
