<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Restoran - Cicipin</title>
    <link rel="icon" type="image/jpg" href="{{ url_for('static', filename='favicon.jpg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <header>
        <div class="header-inner">
            <a href="{{ url_for('index') }}" class="logo">
                <div class="logo-mark">
                    <img src="{{ url_for('static', filename='favicon.jpg') }}" alt="Cicipin" />
                </div>
                <div class="logo-text">Cicipin</div>
            </a>
        </div>
    </header>

    <div class="form-container">
        <div class="form-section">
            <h2>Tambah Restoran Baru</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="popup {{ category }} show" id="popupMessage">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('add_restaurant') }}" method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Nama Restoran:</label>
                    <input type="text" name="name" required>
                </div>

                <div class="form-group">
                    <label>Kategori:</label>
                    <select name="category" required>
                        <option value="">Pilih kategori</option>
                        <option value="Indonesia">Indonesia</option>
                        <option value="Jepang">Jepang</option>
                        <option value="Italia">Italia</option>
                        <option value="Chinese">Chinese</option>
                        <option value="Seafood">Seafood</option>
                        <option value="Kafe">Kafe</option>
                        <option value="Street Food">Street Food</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Alamat:</label>
                    <input type="text" name="address" required>
                </div>

                <div class="form-group">
                    <label>Jam Buka (opsional):</label>
                    <input type="text" name="opening_hours" placeholder="08:00-22:00">
                    <small>Format: HH:MM-HH:MM</small>
                </div>

                <div class="form-group">
                    <label>Latitude:</label>
                    <input type="number" name="latitude" step="any" placeholder="-6.2088" required>
                </div>

                <div class="form-group">
                    <label>Longitude:</label>
                    <input type="number" name="longitude" step="any" placeholder="106.8456" required>
                </div>

                <div class="form-group">
                    <label>Price Range (contoh: Rp 10.000 - 50.000):</label>
                    <input type="text" name="price_range" required>
                </div>

                <div class="form-group">
                    <label>Upload Foto Restoran (opsional):</label>
                    <input type="file" name="image" accept="image/*">
                </div>

                <button type="submit" class="btn btn-primary">Tambah Restoran</button>
            </form>

            <div class="auth-link" style="margin-top:20px;">
                <a href="{{ url_for('index') }}">Kembali ke daftar restoran</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
